<!-- ============================================
     SCHEMA.ORG — DATOS ESTRUCTURADOS PARA GOOGLE
     Permite que Google muestre información rica en
     búsquedas: nombre, horario, teléfono, ubicación.
     
     CÓMO VALIDAR:
     https://search.google.com/test/rich-results
     Pegar la URL del sitio o el código directamente.

     CAMPOS A MANTENER ACTUALIZADOS:
     - opens / closes: horario de atención real
     - priceRange: rango de precios actual
     - telephone: número de WhatsApp
     - sameAs: si cambian las redes sociales
     ============================================ -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Bakery",
        "name": "Dulce Mordida",
        "url": "https://www.dulcemordida.com",

        "address": {

        },
        "geo": {
            "@type": "GeoCoordinates",
            "latitude": -12.0869582,
            "longitude": -76.9757827
        },
        "openingHoursSpecification": {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
                "Monday","Tuesday","Wednesday",
                "Thursday","Friday","Saturday","Sunday"
            ],
            "opens": "11:00",
            "closes": "20:30"
        },
        "sameAs": [
            "https://www.instagram.com/DulceMordida",
            "https://www.tiktok.com/@Dulce.Mordida",
            "https://www.google.com/maps/place/Dulce+Mordida/@-12.0869687,-76.9757827,17z"
        ],
        "hasMap": "https://www.google.com/maps/place/Dulce+Mordida/@-12.0869687,-76.9757827,17z",
        "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+51954301376",

            "availableLanguage": "Spanish"
        }
    }
    </script>

<!-- 💡 Un truco de oro cuando subas tu web a internet:
Tanto Instagram como Facebook guardan en su memoria ("caché") la primera versión que ven de una web. 
Si en el futuro cambias esta foto o el texto y ves que en Instagram se sigue mostrando lo viejo, 
solo debes entrar a una herramienta gratuita de Google llamada "Meta Sharing Debugger" 
(Depurador de contenido compartido de Meta). Pegas tu link ahí, le das al botón “Depurar 
/ Volver a extraer” y obligarás a Instagram a actualizar la imagen al instante. -->
